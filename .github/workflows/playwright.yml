name: Playwright CI

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Select suite to execute
        required: true
        default: full
        type: choice
        options:
          - smoke
          - regression
          - full
      run_number:
        description: Unique run number for test data
        required: false
        default: "1"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      CI: true
      HEADLESS: true
      PW_TRACE_MODE: on
      TEST_GAP_MS: 3000
      BROWSER: chromium
      RUN_NUMBER: ${{ github.event.inputs.run_number || '1' }}
      BASE_URL: ${{ secrets.BASE_URL }}
      SF_LOGIN_URL: ${{ secrets.SF_LOGIN_URL }}
      SF_USERNAME: ${{ secrets.SF_USERNAME }}
      SF_PASSWORD: ${{ secrets.SF_PASSWORD }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Install Playwright browsers and OS dependencies
      - name: Install Playwright browser
        run: npx playwright install chromium

      # Step 5: Run login setup and generate auth.json before suite execution
      - name: Generate auth.json
        run: npx playwright test tests/login.setup.ts --project=setup --workers=1
        env:
          SKIP_GLOBAL_SETUP: true

      # Step 6A: Run smoke suite
      - name: Run smoke suite sequentially
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'smoke'
        run: npx playwright test tests/ui/smoke.spec.ts --project=ci-sequential --workers=1

      # Step 6B: Run ordered regression/full suite using the same local sequence
      - name: Run ordered serial suite
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.suite == 'regression' || github.event.inputs.suite == 'full'))
        run: npm run test:serial-suite:html

      # Step 7: Upload HTML report as artifact
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 5
          if-no-files-found: warn

      # Step 8: Upload test results (screenshots/videos/traces)
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 5
          if-no-files-found: warn

  publish-report:
    if: always()
    needs: playwright
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download HTML report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
